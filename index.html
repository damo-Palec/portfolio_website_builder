:root{
  --ink:#16203a; --ink-soft:#33415f; --ink-faint:#6b7689;
  --gold:#cf8f14; --gold-bright:#f0a800; --gold-soft:#fbeccb;
  --blue:#1b46c2; --blue-bright:#2f5ae0; --blue-soft:#e6ebfb;
  --red:#d92d2d; --red-soft:#fbe3e3;
  --purple:#7b3aa0; --purple-bright:#9a4fc6; --purple-soft:#f1e7f8;
  --paper:#ffffff; --canvas:#eceef3; --panel:#f7f8fb;
  --line:#dde1ea; --line-soft:#e9ecf2;
  --good:#1b46c2; --good-soft:#e6ebfb;
  --warn:#cf8f14; --warn-soft:#fbeccb;
  --bad:#d92d2d; --bad-soft:#fbe3e3;
  --serif:'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body,#root{height:100%;margin:0}
.dr-root{font-family:var(--sans);color:var(--ink);background:var(--canvas);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.dr-serif{font-family:var(--serif)}
button{font-family:inherit}
::selection{background:var(--gold-soft)}

/* topbar */
.dr-top{display:flex;align-items:center;gap:14px;height:60px;flex-shrink:0;padding:0 22px;background:var(--ink);color:#fff;position:relative;z-index:30}
.dr-brand{font-family:var(--serif);font-size:19px;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
.dr-brand b{font-weight:700}
.dr-brand .tag{font-family:var(--sans);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-bright);border:1px solid rgba(211,154,60,.45);padding:2px 7px;border-radius:99px}
.dr-spacer{flex:1}
.dr-logo-wrap{background:#fff;border-radius:8px;padding:3px 5px;display:inline-flex;align-items:center;box-shadow:0 1px 5px rgba(0,0,0,.28)}
.dr-logo{height:26px;width:auto;display:block}
.photo-row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.avatar-prev{width:76px;height:76px;border-radius:50%;background:var(--panel);border:1px solid var(--line);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);flex-shrink:0}
.avatar-prev img{width:100%;height:100%;object-fit:cover}
.dr-brand .ats{color:var(--gold-bright);font-weight:700}
.dr-top::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:linear-gradient(90deg,#16203a,#1b46c2 26%,#f0a800 50%,#d92d2d 73%,#7b3aa0)}

/* generic buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);
  padding:8px 13px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s;white-space:nowrap}
.btn:hover{border-color:var(--ink-faint)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn.gold:hover{background:#a5731f;border-color:#a5731f}
.btn.ink{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.ink:hover{background:#0f1830}
.btn.ai{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.ai:hover{background:#682f8a;border-color:#682f8a}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-faint)}
.btn.ghost:hover{background:var(--line-soft);color:var(--ink)}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:7px}
.btn.danger:hover{border-color:var(--bad);color:var(--bad)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* inputs */
.fld{margin-bottom:13px}
.fld label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.inp,.ta{width:100%;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 11px;font-size:14px;color:var(--ink);font-family:inherit;transition:.14s}
.inp:focus,.ta:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(185,130,42,.14)}
.ta{resize:vertical;min-height:84px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}

/* layout */
.dr-work{display:grid;grid-template-columns:240px 1fr 1fr;flex:1 1 0;min-height:0}
.dr-scroll{flex:1 1 0;min-height:0;overflow-y:auto}
@media(max-width:1100px){.dr-work{grid-template-columns:200px 1fr}.dr-preview-col{display:none}}
@media(max-width:760px){.dr-work{grid-template-columns:1fr}.dr-steps-col{display:none}}
.dr-steps-col{background:var(--ink);overflow-y:auto;min-height:0;padding:14px 10px}
.dr-edit-col{overflow-y:auto;min-height:0;padding:22px clamp(16px,3vw,30px);border-right:1px solid var(--line)}
.dr-preview-col{background:var(--canvas);overflow-y:auto;min-height:0;padding:22px}

/* step nav */
.step{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 11px;border-radius:9px;border:none;
  background:transparent;color:#b9c2d6;cursor:pointer;font-size:13.5px;font-weight:600;transition:.13s;margin-bottom:2px}
.step:hover{background:rgba(255,255,255,.06);color:#fff}
.step.active{background:rgba(211,154,60,.16);color:#fff}
.step.active .step-ic{color:var(--gold-bright)}
.step-ic{display:flex;width:26px;height:26px;align-items:center;justify-content:center;flex-shrink:0;border-radius:7px;background:rgba(255,255,255,.06)}
.step.active .step-ic{background:rgba(211,154,60,.22)}
.step .dot{margin-left:auto;width:7px;height:7px;border-radius:99px;background:var(--gold-bright)}

/* dashboard cards */
.dash-wrap{max-width:1080px;margin:0 auto;padding:34px clamp(18px,4vw,40px)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:22px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.16s;cursor:pointer;display:flex;flex-direction:column}
.rcard:hover{border-color:var(--gold);box-shadow:0 10px 30px -16px rgba(22,32,58,.35);transform:translateY(-2px)}
.rcard-top{height:128px;background:linear-gradient(135deg,#f7f8fb,#e7eaf1);position:relative;overflow:hidden;border-bottom:1px solid var(--line-soft)}
.rcard-mini{position:absolute;inset:14px;background:#fff;border-radius:5px;box-shadow:0 4px 14px -8px rgba(0,0,0,.3);padding:9px 10px;overflow:hidden}
.rcard-mini .mh{height:7px;width:55%;background:var(--ink);border-radius:2px;margin-bottom:5px}
.rcard-mini .ml{height:3.5px;background:var(--line);border-radius:2px;margin-bottom:4px}
.rcard-body{padding:13px 15px 15px}
.rcard h3{font-family:var(--serif);font-size:16.5px;margin:0 0 3px}
.rcard .meta{font-size:12px;color:var(--ink-faint)}
.rcard-actions{display:flex;gap:4px;padding:0 9px 11px}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.3px}

/* section + entries */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px}
.sec-head h2{font-family:var(--serif);font-size:23px;margin:0;letter-spacing:.2px}
.sec-sub{color:var(--ink-faint);font-size:13.5px;margin:0 0 20px;max-width:54ch;line-height:1.5}
.entry{border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:13px;background:var(--panel)}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.entry-head strong{font-size:13px;color:var(--ink-soft)}
.bullet-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px}
.bullet-row .inp{flex:1}

/* skill rating */
.stars{display:inline-flex;gap:3px}
.stars button{background:none;border:none;cursor:pointer;padding:1px;color:var(--line);display:flex}
.stars button.on{color:var(--gold-bright)}

/* ATS / score */
.score-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.dial-wrap{display:flex;align-items:center;gap:18px}
.rec{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:8px 0;border-top:1px solid var(--line-soft);line-height:1.45}
.rec:first-of-type{border-top:none}
.rec .ic{flex-shrink:0;margin-top:1px}

/* template strip */
.tpl-strip{display:flex;gap:9px;flex-wrap:wrap}
.tpl-opt{border:2px solid var(--line);border-radius:10px;padding:8px;cursor:pointer;width:84px;background:#fff;transition:.14s}
.tpl-opt:hover{border-color:var(--ink-faint)}
.tpl-opt.on{border-color:var(--gold)}
.tpl-thumb{height:58px;border-radius:4px;overflow:hidden;margin-bottom:6px;background:#fff;border:1px solid var(--line-soft)}
.tpl-opt span{font-size:11px;font-weight:700;display:block;text-align:center;color:var(--ink-soft)}

/* preview frame */
.pv-frame{background:#fff;box-shadow:0 14px 44px -22px rgba(22,32,58,.45);margin:0 auto;width:100%;max-width:660px;border-radius:4px}
.pv-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.pv-toolbar .lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint)}

/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--ink-faint)}
.empty .ic{width:62px;height:62px;border-radius:16px;background:var(--ink);color:var(--gold-bright);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

/* toast */
.saving{position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;
  padding:9px 14px;border-radius:99px;display:flex;align-items:center;gap:8px;z-index:50;box-shadow:0 8px 24px -10px rgba(0,0,0,.5)}

/* mobile preview toggle */
.mobile-pv{display:none}
@media(max-width:1100px){.mobile-pv{display:inline-flex}}

/* ============ PRINT: only the resume page is printed ============ */
@media print{
  .dr-root{height:auto !important;overflow:visible !important;display:block !important}
  .dr-root>*{display:none !important}
  #print-mount{display:block !important;position:static}
  body{background:#fff}
  @page{margin:14mm}
}
#print-mount{display:none}

.spin{animation:dr-spin 1s linear infinite}@keyframes dr-spin{to{transform:rotate(360deg)}}
.ed-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.name-field{display:inline-flex;align-items:center;gap:9px;background:var(--ink);border:1px solid var(--ink);border-radius:11px;padding:7px 14px;max-width:min(52vw,480px);box-shadow:0 6px 18px -10px rgba(22,32,58,.55);transition:.14s}
.name-field:hover{background:#1d2c52;border-color:#1d2c52}
.name-field:focus-within{box-shadow:0 0 0 3px rgba(185,130,42,.4)}
.name-ic{color:var(--gold-bright);flex-shrink:0}
.name-grow{display:inline-grid;align-items:center;min-width:0}
.name-grow::after{content:attr(data-value) " ";visibility:hidden;white-space:pre;grid-area:1/1;font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:.2px}
.name-inp{grid-area:1/1;width:100%;min-width:60px;font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:.2px;border:none;background:transparent;padding:0;color:#fff}
.name-inp:focus{outline:none}
.name-inp::placeholder{color:rgba(255,255,255,.5);font-weight:500}
.foot-nav{display:flex;justify-content:space-between;margin-top:26px;padding-top:18px;border-top:1px solid var(--line)}
.mstep{display:none}@media(max-width:760px){.mstep{display:block;margin-bottom:16px}}
.pv-overlay{position:fixed;inset:0;background:rgba(15,20,35,.7);z-index:60;display:flex;flex-direction:column;padding:16px}
.pv-overlay .bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
.pv-overlay .scroll{flex:1;overflow-y:auto}
.sample-overlay{position:fixed;inset:0;background:rgba(15,20,35,.72);z-index:70;display:flex;align-items:center;justify-content:center;padding:16px}
.sample-modal{background:#fff;width:min(900px,100%);max-height:90vh;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px -30px rgba(0,0,0,.6)}
.sample-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line)}
.sample-body{overflow-y:auto;padding:18px 22px}
.sample-track{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:9px;border-bottom:2px solid var(--gold-soft);padding-bottom:4px}
.sample-roles{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:8px}
.sample-role{display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:.13s}
.sample-role:hover{border-color:var(--gold);background:#fff;transform:translateY(-1px)}
.sample-role svg{color:var(--ink-faint);flex-shrink:0}
.btn.ondark{background:transparent;border-color:rgba(255,255,255,.28);color:#fff}
.btn.ondark:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5)}
.confirm-card{background:#fff;width:min(420px,100%);border-radius:14px;padding:22px;box-shadow:0 30px 80px -30px rgba(0,0,0,.6)}
